<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glamour Studio — Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --surface2: #1a1a1a;
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --gold-dim: rgba(201,168,76,0.12);
      --text: #f0ead8;
      --text-muted: #7a7060;
      --border: #2a2520;
      --bubble-bot: #1e1c18;
      --bubble-user: #c9a84c;
      --shadow: 0 8px 40px rgba(0,0,0,0.5);
      --green: #4ade80;
      --red: #f87171;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }
    .chat-wrap {
      width: 100%; max-width: 420px;
      height: 92vh; max-height: 780px;
      display: flex; flex-direction: column;
      background: var(--surface);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    /* HEADER */
    .chat-header {
      background: linear-gradient(135deg, #1a1710 0%, #0d0d0d 100%);
      padding: 18px 20px 16px;
      display: flex; align-items: center; gap: 12px;
      position: relative;
      border-bottom: 1px solid var(--border);
    }
    .chat-header::after {
      content: ''; position: absolute;
      bottom: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--gold), transparent);
    }
    .avatar {
      width: 44px; height: 44px;
      background: var(--gold-dim); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; border: 1.5px solid var(--gold); flex-shrink: 0;
    }
    .header-info { flex: 1; }
    .header-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px; color: var(--gold-light);
      font-weight: 600; letter-spacing: 0.5px;
    }
    .header-status { display: flex; align-items: center; gap: 5px; margin-top: 2px; }
    .status-dot {
      width: 7px; height: 7px; background: #4ade80;
      border-radius: 50%; animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .status-text { font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px; text-transform: uppercase; }

    /* MESSAGES */
    .chat-messages {
      flex: 1; overflow-y: auto;
      padding: 20px 16px;
      display: flex; flex-direction: column; gap: 10px;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 3px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-row {
      display: flex; align-items: flex-end; gap: 8px;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--gold-dim); border: 1px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
    }
    .bubble {
      max-width: 78%; padding: 11px 15px; border-radius: 18px;
      font-size: 14px; line-height: 1.5; color: var(--text);
      background: var(--bubble-bot); border: 1px solid var(--border);
    }
    .bubble.user {
      background: var(--bubble-user); color: #0d0d0d;
      font-weight: 500; border-color: transparent;
      border-bottom-right-radius: 5px;
    }
    .bubble.bot { border-bottom-left-radius: 5px; }

    /* QUICK REPLIES */
    .quick-replies {
      display: flex; flex-wrap: wrap; gap: 7px;
      margin-top: 8px; padding-left: 36px;
      animation: fadeUp 0.4s ease 0.1s both;
    }
    .qr-btn {
      background: transparent; border: 1.5px solid var(--gold);
      color: var(--gold); padding: 7px 13px; border-radius: 20px;
      font-size: 13px; font-family: 'DM Sans', sans-serif;
      font-weight: 500; cursor: pointer;
      transition: all 0.18s ease; white-space: nowrap;
    }
    .qr-btn:hover { background: var(--gold); color: #0d0d0d; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(201,168,76,0.3); }
    .qr-btn:active { transform: translateY(0); }
    .qr-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* BOOKING FORM */
    .booking-form {
      background: var(--bubble-bot);
      border: 1px solid var(--border);
      border-radius: 18px; border-bottom-left-radius: 5px;
      padding: 16px; max-width: 82%;
      animation: fadeUp 0.3s ease;
      display: flex; flex-direction: column; gap: 10px;
    }
    .booking-form label {
      font-size: 11px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.6px;
      display: block; margin-bottom: 3px;
    }
    .booking-form input, .booking-form select {
      width: 100%; padding: 9px 12px;
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      outline: none; transition: border-color 0.2s;
    }
    .booking-form input:focus, .booking-form select:focus { border-color: var(--gold); }
    .booking-form input::placeholder { color: var(--text-muted); }
    .booking-form select option { background: #1a1a1a; color: var(--text); }
    .booking-submit {
      background: var(--gold); color: #0d0d0d;
      border: none; border-radius: 10px;
      padding: 10px; font-size: 14px; font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: all 0.18s ease; margin-top: 4px;
    }
    .booking-submit:hover { background: var(--gold-light); }
    .booking-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    /* TYPING */
    .typing-row { display: flex; align-items: flex-end; gap: 8px; animation: fadeUp 0.3s ease; }
    .typing-bubble {
      background: var(--bubble-bot); border: 1px solid var(--border);
      border-radius: 18px; border-bottom-left-radius: 5px;
      padding: 12px 16px; display: flex; gap: 5px; align-items: center;
    }
    .typing-dot {
      width: 6px; height: 6px; background: var(--gold);
      border-radius: 50%; animation: typingBounce 1.2s infinite; opacity: 0.6;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-5px);opacity:1} }

    /* INPUT */
    .chat-input-area {
      padding: 12px 16px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex; gap: 10px; align-items: center;
    }
    .chat-input {
      flex: 1; padding: 11px 16px;
      border: 1.5px solid var(--border); border-radius: 24px;
      font-size: 14px; font-family: 'DM Sans', sans-serif;
      background: var(--surface2); color: var(--text);
      outline: none; transition: border-color 0.2s;
    }
    .chat-input:focus { border-color: var(--gold); }
    .chat-input::placeholder { color: var(--text-muted); }
    .send-btn {
      width: 42px; height: 42px; background: var(--gold);
      border: none; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s ease; flex-shrink: 0;
    }
    .send-btn:hover { background: var(--gold-light); transform: scale(1.05); }
    .send-btn:active { transform: scale(0.97); }
    .send-btn svg { width: 18px; height: 18px; fill: #0d0d0d; }

    .powered {
      text-align: center; font-size: 11px; color: var(--text-muted);
      padding: 0 0 10px; opacity: 0.5; letter-spacing: 0.5px;
    }

    /* CONFIRMATION CARD */
    .confirm-card {
      background: var(--bubble-bot);
      border: 1px solid var(--gold);
      border-radius: 18px; border-bottom-left-radius: 5px;
      padding: 16px; max-width: 82%;
      animation: fadeUp 0.3s ease;
    }
    .confirm-card .confirm-title {
      font-size: 15px; font-weight: 500;
      color: var(--gold-light); margin-bottom: 10px;
    }
    .confirm-card .confirm-row {
      display: flex; justify-content: space-between;
      font-size: 13px; padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }
    .confirm-card .confirm-row:last-of-type { border-bottom: none; }
    .confirm-card .confirm-label { color: var(--text-muted); }
    .confirm-card .confirm-val { color: var(--text); font-weight: 500; }
  </style>
</head>
<body>
<div class="chat-wrap">
  <div class="chat-header">
    <div class="avatar">✂️</div>
    <div class="header-info">
      <div class="header-name">Glamour Studio</div>
      <div class="header-status">
        <div class="status-dot"></div>
        <span class="status-text">Always available</span>
      </div>
    </div>
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="chat-input-area">
    <input class="chat-input" id="userInput" type="text" placeholder="Type a message…" autocomplete="off" />
    <button class="send-btn" onclick="sendMessage()" aria-label="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="powered">Powered by AI ✦ Glamour Studio</div>
</div>

<script>
const SALON = {
  name: "Glamour Studio",
  hours: "Mon–Sat, 9 AM – 8 PM. Closed Sundays.",
  maps: "https://maps.google.com/?q=Glamour+Studio+Miami",
  services: ["Haircut ($25+)", "Hair Color ($60+)", "Beard Trim ($15)", "Facial ($45)", "Manicure ($30)", "Pedicure ($35)"]
};

let conversationHistory = [];
let bookingData = {};        // accumulates info during booking flow
let bookingStep = null;      // tracks which step we're on

const msgs = () => document.getElementById("messages");

/* ── helpers ── */
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function scrollBottom() {
  const m = msgs(); m.scrollTop = m.scrollHeight;
}

function showTyping() {
  const row = document.createElement("div");
  row.className = "typing-row"; row.id = "typing";
  const av = document.createElement("div");
  av.className = "msg-avatar"; av.textContent = "✂️";
  const bub = document.createElement("div");
  bub.className = "typing-bubble";
  bub.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  row.appendChild(av); row.appendChild(bub);
  msgs().appendChild(row); scrollBottom();
}

function removeTyping() { const t = document.getElementById("typing"); if (t) t.remove(); }

function appendMessage(role, html, buttons) {
  const row = document.createElement("div");
  row.className = `msg-row ${role}`;
  if (role === "bot") {
    const av = document.createElement("div");
    av.className = "msg-avatar"; av.textContent = "✂️";
    row.appendChild(av);
  }
  const bub = document.createElement("div");
  bub.className = `bubble ${role}`;
  bub.innerHTML = html.replace(/\n/g, "<br>");
  row.appendChild(bub);
  msgs().appendChild(row);
  if (buttons) appendButtons(buttons);
  scrollBottom();
}

function appendButtons(buttons) {
  const qr = document.createElement("div");
  qr.className = "quick-replies";
  buttons.forEach(btn => {
    const b = document.createElement("button");
    b.className = "qr-btn"; b.textContent = btn.label;
    b.onclick = () => {
      // disable all sibling buttons to prevent double-taps
      qr.querySelectorAll(".qr-btn").forEach(x => x.disabled = true);
      handleQuickReply(btn.value);
    };
    qr.appendChild(b);
  });
  msgs().appendChild(qr); scrollBottom();
}

/* ── booking form ── */
function showBookingForm() {
  const container = document.createElement("div");
  container.className = "msg-row bot";
  const av = document.createElement("div");
  av.className = "msg-avatar"; av.textContent = "✂️";

  const form = document.createElement("div");
  form.className = "booking-form";
  form.innerHTML = `
    <div>
      <label>Your name</label>
      <input id="b-name" type="text" placeholder="e.g. Sarah Johnson" />
    </div>
    <div>
      <label>Phone number</label>
      <input id="b-phone" type="tel" placeholder="e.g. +1 305 000 0000" />
    </div>
    <div>
      <label>Email</label>
      <input id="b-email" type="email" placeholder="e.g. sarah@email.com" />
    </div>
    <div>
      <label>Service</label>
      <select id="b-service">
        <option value="">Select a service…</option>
        <option>Haircut</option>
        <option>Hair Color</option>
        <option>Beard Trim</option>
        <option>Facial</option>
        <option>Manicure</option>
        <option>Pedicure</option>
      </select>
    </div>
    <div>
      <label>Preferred date</label>
      <input id="b-date" type="date" min="${todayStr()}" />
    </div>
    <div>
      <label>Preferred time (e.g. 2:30 PM)</label>
      <input id="b-time" type="text" placeholder="e.g. 10:00 AM" />
    </div>
    <button class="booking-submit" id="b-submit" onclick="submitBooking()">Confirm Booking ✦</button>
  `;

  container.appendChild(av);
  container.appendChild(form);
  msgs().appendChild(container);
  scrollBottom();
}

function todayStr() {
  const d = new Date();
  return d.toISOString().split("T")[0];
}

async function submitBooking() {
  const name    = document.getElementById("b-name").value.trim();
  const phone   = document.getElementById("b-phone").value.trim();
  const email   = document.getElementById("b-email").value.trim();
  const service = document.getElementById("b-service").value;
  const date    = document.getElementById("b-date").value;
  const time    = document.getElementById("b-time").value.trim();

  if (!name || !phone || !email || !service || !date || !time) {
    appendMessage("bot", "Please fill in all fields before confirming 😊");
    return;
  }

  const btn = document.getElementById("b-submit");
  btn.disabled = true;
  btn.textContent = "Booking…";

  try {
    const res = await fetch("/book", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, phone, email, service, date, time })
    });
    const data = await res.json();

    if (data.success) {
      showConfirmCard({ name, service, date, time });
    } else {
      appendMessage("bot", "Something went wrong saving your booking 😟 Please try again or call us at +1 305 123 4567.");
      btn.disabled = false; btn.textContent = "Confirm Booking ✦";
    }
  } catch {
    appendMessage("bot", "Connection error 😟 Please try again.");
    btn.disabled = false; btn.textContent = "Confirm Booking ✦";
  }
}

function showConfirmCard({ name, service, date, time }) {
  const formatted = new Date(date + "T00:00").toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" });

  const container = document.createElement("div");
  container.className = "msg-row bot";
  const av = document.createElement("div");
  av.className = "msg-avatar"; av.textContent = "✂️";

  const card = document.createElement("div");
  card.className = "confirm-card";
  card.innerHTML = `
    <div class="confirm-title">🎉 You're booked, ${name.split(" ")[0]}!</div>
    <div class="confirm-row"><span class="confirm-label">Service</span><span class="confirm-val">${service}</span></div>
    <div class="confirm-row"><span class="confirm-label">Date</span><span class="confirm-val">${formatted}</span></div>
    <div class="confirm-row"><span class="confirm-label">Time</span><span class="confirm-val">${time}</span></div>
    <div style="margin-top:10px;font-size:12px;color:var(--text-muted)">We'll see you soon ✨ Call us at +1 305 123 4567 if you need to reschedule.</div>
  `;

  container.appendChild(av);
  container.appendChild(card);
  msgs().appendChild(container);
  scrollBottom();
}

/* ── quick reply router ── */
async function handleQuickReply(value) {
  appendMessage("user", value);
  await delay(600);
  showTyping();
  await delay(800);
  removeTyping();

  const map = {
    "Our Services": {
      text: `Here's what we offer ✂️\n${SALON.services.join(" · ")}\n\nWant to book one?`,
      buttons: [
        { label: "📅 Book Appointment", value: "Book Appointment" },
        { label: "🕒 Opening Hours",    value: "Opening Hours" }
      ]
    },
    "Opening Hours": {
      text: `We're open ${SALON.hours} 😊\nWalk-ins welcome, or book in advance right here!`,
      buttons: [
        { label: "📅 Book Appointment", value: "Book Appointment" },
        { label: "📍 Location",         value: "Location" }
      ]
    },
    "Location": {
      text: `Find us here 👇\n${SALON.maps}\nFree parking available 🚗`,
      buttons: [
        { label: "📅 Book Appointment", value: "Book Appointment" },
        { label: "✂️ Our Services",     value: "Our Services" }
      ]
    },
    "Book Appointment": null  // handled below
  };

  if (value === "Book Appointment") {
    appendMessage("bot", "Let's get you booked in! 💇 Fill in your details below 👇");
    showBookingForm();
    return;
  }

  const r = map[value];
  if (r) { appendMessage("bot", r.text, r.buttons); return; }

  // fallback → AI
  await aiReply(value);
}

/* ── free-text AI reply ── */
async function aiReply(text) {
  conversationHistory.push({ role: "user", content: text });
  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, history: conversationHistory })
    });
    const data = await res.json();
    const reply = data.reply || "Sorry, I didn't catch that 😊";
    conversationHistory.push({ role: "assistant", content: reply });
    appendMessage("bot", reply, [
      { label: "✂️ Our Services",     value: "Our Services" },
      { label: "📅 Book Appointment", value: "Book Appointment" }
    ]);
  } catch {
    appendMessage("bot", "Something went wrong. Please try again 😊");
  }
}

async function sendMessage() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  appendMessage("user", text);
  showTyping();
  await delay(800);
  removeTyping();

  // detect booking intent in free text
  const lower = text.toLowerCase();
  if (lower.includes("book") || lower.includes("appointment") || lower.includes("reserve") || lower.includes("schedule")) {
    appendMessage("bot", "Let's get you booked in! 💇 Fill in your details below 👇");
    showBookingForm();
    return;
  }

  await aiReply(text);
}

document.getElementById("userInput").addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

/* ── welcome ── */
window.addEventListener("load", () => {
  setTimeout(() => {
    appendMessage(
      "bot",
      `Hi, welcome to Glamour Studio ✂️✨\nI can help you with our services, pricing, hours, or booking.\nChoose an option below or type your question 👇`,
      [
        { label: "✂️ Our Services",     value: "Our Services" },
        { label: "🕒 Opening Hours",    value: "Opening Hours" },
        { label: "📍 Location",         value: "Location" },
        { label: "📅 Book Appointment", value: "Book Appointment" }
      ]
    );
  }, 400);
});
</script>
</body>
</html>
