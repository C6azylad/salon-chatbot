<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glamour Studio — Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --surface2: #1a1a1a;
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --gold-dim: rgba(201,168,76,0.12);
      --text: #f0ead8;
      --text-muted: #7a7060;
      --border: #2a2520;
      --bubble-bot: #1e1c18;
      --bubble-user: #c9a84c;
      --shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 16px;
    }
    .chat-wrap {
      width: 100%; max-width: 420px;
      height: 92vh; max-height: 780px;
      display: flex; flex-direction: column;
      background: var(--surface);
      border-radius: 24px; box-shadow: var(--shadow);
      overflow: hidden; border: 1px solid var(--border);
    }

    /* HEADER */
    .chat-header {
      background: linear-gradient(135deg, #1a1710 0%, #0d0d0d 100%);
      padding: 18px 20px 16px;
      display: flex; align-items: center; gap: 12px;
      position: relative; border-bottom: 1px solid var(--border);
    }
    .chat-header::after {
      content: ''; position: absolute;
      bottom: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--gold), transparent);
    }
    .avatar {
      width: 44px; height: 44px; background: var(--gold-dim);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 20px; border: 1.5px solid var(--gold); flex-shrink: 0;
    }
    .header-info { flex: 1; }
    .header-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px; color: var(--gold-light);
      font-weight: 600; letter-spacing: 0.5px;
    }
    .header-status { display: flex; align-items: center; gap: 5px; margin-top: 2px; }
    .status-dot {
      width: 7px; height: 7px; background: #4ade80;
      border-radius: 50%; animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .status-text { font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px; text-transform: uppercase; }

    /* MESSAGES */
    .chat-messages {
      flex: 1; overflow-y: auto;
      padding: 20px 16px;
      display: flex; flex-direction: column; gap: 10px;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 3px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-row {
      display: flex; align-items: flex-end; gap: 8px;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--gold-dim); border: 1px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
    }
    .bubble {
      max-width: 78%; padding: 11px 15px; border-radius: 18px;
      font-size: 14px; line-height: 1.5; color: var(--text);
      background: var(--bubble-bot); border: 1px solid var(--border);
    }
    .bubble.user {
      background: var(--bubble-user); color: #0d0d0d;
      font-weight: 500; border-color: transparent;
      border-bottom-right-radius: 5px;
    }
    .bubble.bot { border-bottom-left-radius: 5px; }

    /* QUICK REPLIES */
    .quick-replies {
      display: flex; flex-wrap: wrap; gap: 7px;
      margin-top: 8px; padding-left: 36px;
      animation: fadeUp 0.4s ease 0.1s both;
    }
    .qr-btn {
      background: transparent; border: 1.5px solid var(--gold);
      color: var(--gold); padding: 7px 13px; border-radius: 20px;
      font-size: 13px; font-family: 'DM Sans', sans-serif;
      font-weight: 500; cursor: pointer;
      transition: all 0.18s ease; white-space: nowrap;
    }
    .qr-btn:hover { background: var(--gold); color: #0d0d0d; transform: translateY(-1px); }
    .qr-btn:active { transform: translateY(0); }
    .qr-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* MULTI-SELECT SERVICES */
    .service-grid {
      display: flex; flex-wrap: wrap; gap: 7px;
      margin-top: 8px; padding-left: 36px;
      animation: fadeUp 0.4s ease 0.1s both;
    }
    .svc-btn {
      background: transparent; border: 1.5px solid var(--border);
      color: var(--text-muted); padding: 7px 13px; border-radius: 20px;
      font-size: 13px; font-family: 'DM Sans', sans-serif;
      font-weight: 500; cursor: pointer; transition: all 0.18s ease;
    }
    .svc-btn.selected { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }
    .svc-btn:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }
    .svc-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .svc-confirm {
      margin-top: 8px; padding-left: 36px;
      animation: fadeUp 0.3s ease 0.2s both;
    }
    .svc-confirm-btn {
      background: var(--gold); color: #0d0d0d;
      border: none; padding: 9px 20px; border-radius: 20px;
      font-size: 13px; font-family: 'DM Sans', sans-serif;
      font-weight: 500; cursor: pointer; transition: all 0.18s ease;
    }
    .svc-confirm-btn:hover:not(:disabled) { background: var(--gold-light); }
    .svc-confirm-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* TYPING */
    .typing-row { display: flex; align-items: flex-end; gap: 8px; animation: fadeUp 0.3s ease; }
    .typing-bubble {
      background: var(--bubble-bot); border: 1px solid var(--border);
      border-radius: 18px; border-bottom-left-radius: 5px;
      padding: 12px 16px; display: flex; gap: 5px; align-items: center;
    }
    .typing-dot {
      width: 6px; height: 6px; background: var(--gold);
      border-radius: 50%; animation: typingBounce 1.2s infinite; opacity: 0.6;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-5px);opacity:1} }

    /* INPUT */
    .chat-input-area {
      padding: 12px 16px 16px; border-top: 1px solid var(--border);
      background: var(--surface); display: flex; gap: 10px; align-items: center;
    }
    .chat-input {
      flex: 1; padding: 11px 16px;
      border: 1.5px solid var(--border); border-radius: 24px;
      font-size: 14px; font-family: 'DM Sans', sans-serif;
      background: var(--surface2); color: var(--text);
      outline: none; transition: border-color 0.2s;
    }
    .chat-input:focus { border-color: var(--gold); }
    .chat-input::placeholder { color: var(--text-muted); }
    .send-btn {
      width: 42px; height: 42px; background: var(--gold);
      border: none; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s ease; flex-shrink: 0;
    }
    .send-btn:hover { background: var(--gold-light); transform: scale(1.05); }
    .send-btn svg { width: 18px; height: 18px; fill: #0d0d0d; }

    .powered {
      text-align: center; font-size: 11px; color: var(--text-muted);
      padding: 0 0 10px; opacity: 0.5; letter-spacing: 0.5px;
    }

    /* CONFIRM CARD */
    .confirm-card {
      background: var(--bubble-bot); border: 1px solid var(--gold);
      border-radius: 18px; border-bottom-left-radius: 5px;
      padding: 16px; max-width: 82%; animation: fadeUp 0.3s ease;
    }
    .confirm-title { font-size: 15px; font-weight: 500; color: var(--gold-light); margin-bottom: 10px; }
    .confirm-row {
      display: flex; justify-content: space-between; align-items: flex-start;
      font-size: 13px; padding: 5px 0; border-bottom: 1px solid var(--border);
    }
    .confirm-row:last-of-type { border-bottom: none; }
    .confirm-label { color: var(--text-muted); flex-shrink: 0; margin-right: 8px; }
    .confirm-val { color: var(--text); font-weight: 500; text-align: right; }
    .confirm-note { margin-top: 10px; font-size: 12px; color: var(--text-muted); }
  </style>
</head>
<body>
<div class="chat-wrap">
  <div class="chat-header">
    <div class="avatar">✂️</div>
    <div class="header-info">
      <div class="header-name">Glamour Studio</div>
      <div class="header-status">
        <div class="status-dot"></div>
        <span class="status-text">Always available</span>
      </div>
    </div>
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="chat-input-area">
    <input class="chat-input" id="userInput" type="text" placeholder="Type a message…" autocomplete="off" />
    <button class="send-btn" onclick="sendMessage()" aria-label="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="powered">Powered by AI ✦ Glamour Studio</div>
</div>

<script>
const SALON = {
  hours: "Mon–Sat, 9 AM – 8 PM. Closed Sundays.",
  maps: "https://maps.google.com/?q=Glamour+Studio+Miami",
  services: ["Haircut", "Hair Color", "Beard Trim", "Facial", "Manicure", "Pedicure"],
  pricing: "Haircut $25+ · Hair Color $60+ · Beard Trim $15 · Facial $45 · Manicure $30 · Pedicure $35"
};

let conversationHistory = [];
let booking = null;
// booking.step: 'services' | 'name' | 'phone' | 'email' | 'date' | 'time' | 'done'

/* ── helpers ── */
const msgsEl = () => document.getElementById("messages");
const delay = ms => new Promise(r => setTimeout(r, ms));
const scrollBottom = () => { const m = msgsEl(); m.scrollTop = m.scrollHeight; };

function showTyping() {
  const row = document.createElement("div"); row.className = "typing-row"; row.id = "typing";
  const av = document.createElement("div"); av.className = "msg-avatar"; av.textContent = "✂️";
  const bub = document.createElement("div"); bub.className = "typing-bubble";
  bub.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  row.appendChild(av); row.appendChild(bub); msgsEl().appendChild(row); scrollBottom();
}
function removeTyping() { const t = document.getElementById("typing"); if (t) t.remove(); }

function botMsg(html, buttons) {
  const row = document.createElement("div"); row.className = "msg-row bot";
  const av = document.createElement("div"); av.className = "msg-avatar"; av.textContent = "✂️";
  const bub = document.createElement("div"); bub.className = "bubble bot";
  bub.innerHTML = html.replace(/\n/g, "<br>");
  row.appendChild(av); row.appendChild(bub); msgsEl().appendChild(row);
  if (buttons) appendButtons(buttons);
  scrollBottom();
}

function userMsg(text) {
  const row = document.createElement("div"); row.className = "msg-row user";
  const bub = document.createElement("div"); bub.className = "bubble user"; bub.textContent = text;
  row.appendChild(bub); msgsEl().appendChild(row); scrollBottom();
}

function appendButtons(buttons) {
  const qr = document.createElement("div"); qr.className = "quick-replies";
  buttons.forEach(btn => {
    const b = document.createElement("button"); b.className = "qr-btn"; b.textContent = btn.label;
    b.onclick = () => { qr.querySelectorAll(".qr-btn").forEach(x => x.disabled = true); handleQR(btn.value); };
    qr.appendChild(b);
  });
  msgsEl().appendChild(qr); scrollBottom();
}

/* ── service picker ── */
function showServicePicker() {
  const grid = document.createElement("div"); grid.className = "service-grid"; grid.id = "svc-grid";
  SALON.services.forEach(s => {
    const b = document.createElement("button"); b.className = "svc-btn"; b.textContent = s; b.dataset.service = s;
    b.onclick = () => { b.classList.toggle("selected"); updateConfirmBtn(); };
    grid.appendChild(b);
  });
  msgsEl().appendChild(grid);

  const row = document.createElement("div"); row.className = "svc-confirm";
  const cb = document.createElement("button"); cb.className = "svc-confirm-btn"; cb.id = "svc-confirm";
  cb.textContent = "Done ✦"; cb.disabled = true;
  cb.onclick = confirmServices;
  row.appendChild(cb); msgsEl().appendChild(row); scrollBottom();
}

function updateConfirmBtn() {
  const grid = document.getElementById("svc-grid");
  const btn = document.getElementById("svc-confirm");
  if (grid && btn) btn.disabled = grid.querySelectorAll(".selected").length === 0;
}

function confirmServices() {
  const grid = document.getElementById("svc-grid");
  const selected = [...grid.querySelectorAll(".selected")].map(b => b.dataset.service);
  grid.querySelectorAll(".svc-btn").forEach(b => b.disabled = true);
  document.getElementById("svc-confirm").disabled = true;
  booking.services = selected;
  userMsg(selected.join(", "));
  proceedBooking("services");
}

/* ── step machine ── */
function startBooking() {
  booking = { services: [], name: "", phone: "", email: "", date: "", time: "", step: "services" };
  botMsg("What services would you like? 💇 Tap all that apply, then press Done 👇");
  showServicePicker();
}

async function proceedBooking(completedStep) {
  showTyping();
  await delay(700);
  removeTyping();

  const next = { services: "name", name: "phone", phone: "email", email: "date", date: "time" };
  const questions = {
    name:  "What's your name? 😊",
    phone: "What's your phone number? 📱",
    email: "And your email address? 📧",
    date:  "What date works for you? (e.g. 15 June or 2025-06-15) 📅",
    time:  "Almost there! What time would you prefer? (e.g. 2:30 PM) 🕐"
  };

  const nextStep = next[completedStep];
  if (nextStep) {
    booking.step = nextStep;
    botMsg(questions[nextStep]);
  } else if (completedStep === "time") {
    booking.step = "done";
    await submitBooking();
  }
}

/* ── typed input during booking ── */
async function handleBookingInput(text) {
  if (!booking || !booking.step || booking.step === "done") return false;

  const step = booking.step;

  if (step === "name") {
    if (text.length < 2) { botMsg("Please enter your full name 😊"); return true; }
    booking.name = text; proceedBooking("name"); return true;
  }
  if (step === "phone") {
    if (text.replace(/\D/g, "").length < 6) { botMsg("Please enter a valid phone number 😊"); return true; }
    booking.phone = text; proceedBooking("phone"); return true;
  }
  if (step === "email") {
    if (!text.includes("@")) { botMsg("That doesn't look like a valid email — please try again 😊"); return true; }
    booking.email = text; proceedBooking("email"); return true;
  }
  if (step === "date") {
    booking.date = text; proceedBooking("date"); return true;
  }
  if (step === "time") {
    booking.time = text; proceedBooking("time"); return true;
  }
  return false;
}

/* ── submit to /book ── */
async function submitBooking() {
  showTyping();
  try {
    const res = await fetch("/book", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name:    booking.name,
        phone:   booking.phone,
        email:   booking.email,
        service: booking.services.join(", "),
        date:    booking.date,
        time:    booking.time
      })
    });
    const data = await res.json();
    removeTyping();
    if (data.success) {
      showConfirmCard();
    } else {
      console.error("Booking error:", data.error);
      botMsg("Hmm, something went wrong 😟 Please call us at +1 305 123 4567 or try again.",
        [{ label: "🔄 Try Again", value: "Book Appointment" }]);
      booking = null;
    }
  } catch (err) {
    removeTyping();
    console.error("Network error:", err);
    botMsg("Connection error 😟 Please try again.",
      [{ label: "🔄 Try Again", value: "Book Appointment" }]);
    booking = null;
  }
}

function showConfirmCard() {
  const b = booking;
  const row = document.createElement("div"); row.className = "msg-row bot";
  const av = document.createElement("div"); av.className = "msg-avatar"; av.textContent = "✂️";
  const card = document.createElement("div"); card.className = "confirm-card";
  card.innerHTML = `
    <div class="confirm-title">🎉 You're booked, ${b.name.split(" ")[0]}!</div>
    <div class="confirm-row"><span class="confirm-label">Services</span><span class="confirm-val">${b.services.join(", ")}</span></div>
    <div class="confirm-row"><span class="confirm-label">Date</span><span class="confirm-val">${b.date}</span></div>
    <div class="confirm-row"><span class="confirm-label">Time</span><span class="confirm-val">${b.time}</span></div>
    <div class="confirm-row"><span class="confirm-label">Phone</span><span class="confirm-val">${b.phone}</span></div>
    <div class="confirm-note">We'll see you soon ✨ Call +1 305 123 4567 to reschedule.</div>
  `;
  row.appendChild(av); row.appendChild(card); msgsEl().appendChild(row); scrollBottom();
  booking = null;
}

/* ── quick reply router ── */
async function handleQR(value) {
  userMsg(value);
  showTyping(); await delay(800); removeTyping();

  if (value === "Book Appointment") { startBooking(); return; }

  const map = {
    "Our Services": {
      text: `Here's what we offer ✂️\n${SALON.pricing}\n\nWant to book?`,
      buttons: [{ label: "📅 Book Appointment", value: "Book Appointment" }, { label: "🕒 Opening Hours", value: "Opening Hours" }]
    },
    "Opening Hours": {
      text: `We're open ${SALON.hours} 😊`,
      buttons: [{ label: "📅 Book Appointment", value: "Book Appointment" }, { label: "📍 Location", value: "Location" }]
    },
    "Location": {
      text: `Find us here 👇\n${SALON.maps}\nFree parking available 🚗`,
      buttons: [{ label: "📅 Book Appointment", value: "Book Appointment" }, { label: "✂️ Our Services", value: "Our Services" }]
    }
  };

  const r = map[value];
  if (r) { botMsg(r.text, r.buttons); return; }
  await aiReply(value);
}

/* ── AI fallback ── */
async function aiReply(text) {
  conversationHistory.push({ role: "user", content: text });
  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, history: conversationHistory })
    });
    const data = await res.json();
    const reply = data.reply || "Sorry, I didn't catch that 😊";
    conversationHistory.push({ role: "assistant", content: reply });
    botMsg(reply, [
      { label: "✂️ Our Services", value: "Our Services" },
      { label: "📅 Book Appointment", value: "Book Appointment" }
    ]);
  } catch {
    botMsg("Something went wrong. Please try again 😊");
  }
}

/* ── main send ── */
async function sendMessage() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  userMsg(text);

  if (booking && booking.step && booking.step !== "done") {
    const handled = await handleBookingInput(text);
    if (handled) return;
  }

  showTyping(); await delay(800); removeTyping();

  const lower = text.toLowerCase();
  if (lower.includes("book") || lower.includes("appointment") || lower.includes("reserve") || lower.includes("schedule")) {
    startBooking(); return;
  }
  await aiReply(text);
}

document.getElementById("userInput").addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

/* ── welcome ── */
window.addEventListener("load", () => {
  setTimeout(() => {
    botMsg(
      `Hi, welcome to Glamour Studio ✂️✨\nI can help with services, pricing, hours, or booking.\nWhat can I do for you? 👇`,
      [
        { label: "✂️ Our Services",     value: "Our Services" },
        { label: "🕒 Opening Hours",    value: "Opening Hours" },
        { label: "📍 Location",         value: "Location" },
        { label: "📅 Book Appointment", value: "Book Appointment" }
      ]
    );
  }, 400);
});
</script>
</body>
</html>
